<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Presser - Submission received</title>

  //api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">

  <style>
    :root {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.6rem, 1.1rem + 2vw, 2.7rem);
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --color-text: #f8fbff;
      --color-text-muted: rgba(248,251,255,0.78);
      --color-text-faint: rgba(248,251,255,0.5);
      --color-border: rgba(255,255,255,.14);
      --radius-lg: 1.25rem;
      --radius-full: 9999px;
      --font-body: 'Satoshi', Inter, sans-serif;
      --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: var(--font-body);
      background: #05070b;
      color: var(--color-text);
    }

    .app {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: var(--space-4);
    }

    .bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.66), rgba(0,0,0,.86)),
        url('./assets/thepressserchair.jpg') center center / cover no-repeat;
    }

    .panel {
      position: relative;
      z-index: 1;
      width: min(640px, 100%);
      display: grid;
      gap: var(--space-5);
      text-align: center;
      padding: clamp(var(--space-5), 2vw, var(--space-8));
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      font-size: var(--text-sm);
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--color-text-faint);
    }

    .title {
      margin: 0;
      font-size: var(--text-xl);
      font-weight: 800;
      line-height: 1.08;
      color: var(--color-text);
    }

    .copy {
      margin: 0 auto;
      max-width: 42ch;
      font-size: var(--text-base);
      line-height: 1.65;
      color: var(--color-text);
      font-weight: 700;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .btn {
      min-width: 180px;
      min-height: 52px;
      padding: 0 var(--space-6);
      border: none;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), opacity var(--transition);
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: #fff;
      color: #05070b;
    }

    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 1px solid var(--color-border);
    }

    @media (max-width: 640px) {
      .panel {
        padding: var(--space-4);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg"></div>

    <section class="panel">
      <div class="eyebrow" id="eyebrow">Question 1 submitted</div>
      <h1 class="title" id="title">Question 1 Judgement</h1>

      <p class="copy" id="submittedCopy">
        Go to your email now to get your score and click on the link for a full critique by the judges of your performance.
      </p>

      <div class="actions">
        <a class="btn btn-primary" id="returnHomeBtn" href="./index.html">Return Home</a>
        <a class="btn btn-secondary" href="./legends.html">View Legends Lounge</a>
      </div>
    </section>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const round = Number(params.get('round') || '1');
    const submissionId = params.get('submission_id') || '';

    const eyebrow = document.getElementById('eyebrow');
    const title = document.getElementById('title');
    const submittedCopy = document.getElementById('submittedCopy');
    const returnHomeBtn = document.getElementById('returnHomeBtn');

    if (round === 1) {
      eyebrow.textContent = 'Question 1 submitted';
      title.textContent = 'Question 1 Judgement';
      submittedCopy.textContent =
        'Go to your email now to get your score and click on the link for a full critique by the judges of your performance.';
    } else if (round === 2) {
      eyebrow.textContent = 'Question 2 submitted';
      title.textContent = 'Question 2 Judgement';
      submittedCopy.textContent =
        'Go to your email now to get your score and click on the link for a full critique by the judges of your performance.';
    } else {
      eyebrow.textContent = 'Final question submitted';
      title.textContent = 'Final Judgement';
      submittedCopy.textContent =
        'Go to your email now to get your score and click on the link for a full critique by the judges of your performance.';
    }

    if (submissionId) {
      returnHomeBtn.href = './index.html?submission_id=' + encodeURIComponent(submissionId);
    }
  </script>
</body>
</html>
