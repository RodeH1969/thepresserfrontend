<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Presser</title>

  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.6rem, 1.1rem + 2vw, 2.7rem);
      --text-2xl: clamp(2.4rem, 1rem + 4vw, 5.2rem);

      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;

      --color-text: #f8fbff;
      --color-text-muted: rgba(248,251,255,0.78);
      --color-text-faint: rgba(248,251,255,0.5);
      --color-border: rgba(255,255,255,0.14);
      --color-warning: #ff8b5c;
      --color-danger: #ff5f5f;
      --color-success: #7bd88f;

      --radius-md: 0.9rem;
      --radius-lg: 1.25rem;
      --radius-full: 9999px;

      --font-body: 'Satoshi', Inter, sans-serif;
      --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font-body);
      background: #05070b;
      color: var(--color-text);
      overflow: hidden;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.48), rgba(0,0,0,.62)),
        url('./assets/thepressserchair.jpg') center center / cover no-repeat;
      transform: scale(1.02);
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(0,0,0,.84) 0%,
        rgba(0,0,0,.56) 22%,
        rgba(0,0,0,.08) 45%,
        rgba(0,0,0,.08) 55%,
        rgba(0,0,0,.56) 78%,
        rgba(0,0,0,.84) 100%
      );
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px,34vw) 1fr;
      gap: var(--space-6);
      padding: clamp(var(--space-4),3vw,var(--space-8));
      max-width: 1280px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: var(--space-6) 0;
    }

    .title {
      font-size: var(--text-2xl);
      line-height: .92;
      font-weight: 900;
      letter-spacing: -.05em;
      max-width: 5ch;
      text-shadow: 0 8px 24px rgba(0,0,0,.45);
    }

    .panel {
      width: min(620px,100%);
      margin: auto 0 auto auto;
      display: grid;
      gap: var(--space-5);
      justify-items: center;
      text-align: center;
      padding: clamp(var(--space-6),2vw,var(--space-8));
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
      max-height: calc(100vh - 2 * clamp(var(--space-4),3vw,var(--space-8)));
      overflow: auto;
    }

    .hidden { display: none !important; }

    .tagline {
      font-size: var(--text-xl);
      font-weight: 700;
      line-height: 1.08;
      max-width: 15ch;
    }

    .helper, .note, .status-copy {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      max-width: 40ch;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      justify-content: center;
    }

    .btn {
      min-width: 170px;
      min-height: 52px;
      padding: 0 var(--space-6);
      border: none;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition:
        transform var(--transition),
        background var(--transition),
        color var(--transition),
        border-color var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary { background: #fff; color: #05070b; }
    .btn-secondary { background: transparent; color: #fff; border: 1px solid var(--color-border); }
    .btn-success { background: var(--color-success); color: #041108; }

    .question-wrap {
      width: min(780px,100%);
      margin: auto 0 auto auto;
    }

    .question-card {
      display: grid;
      gap: var(--space-4);
      background: rgba(7,10,16,.56);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius-lg);
      padding: clamp(var(--space-5),2vw,var(--space-8));
      backdrop-filter: blur(10px);
    }

    .question-text {
      font-size: clamp(1.35rem, 1rem + 1.6vw, 2.2rem);
      line-height: 1.12;
      font-weight: 800;
      max-width: 22ch;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .question-meta { display: grid; gap: var(--space-2); }

    .question-label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--color-text-faint);
    }

    .progress { display: flex; gap: var(--space-2); }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.18);
    }

    .dot.active { background: #fff; }
    .dot.done { background: rgba(255,255,255,.45); }

    .timer {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-full);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
    }

    .timer-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(#fff calc(var(--progress,100) * 1%), rgba(255,255,255,.12) 0);
    }

    .timer-core {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #06080c;
      font-weight: 800;
      font-size: var(--text-sm);
    }

    .timer-copy { display: grid; gap: 2px; text-align: left; }
    .timer-copy strong { font-size: var(--text-lg); line-height: 1; }

    .timer-copy span {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .16em;
      color: var(--color-text-faint);
    }

    .timer.warning .timer-ring {
      background: conic-gradient(var(--color-warning) calc(var(--progress,100) * 1%), rgba(255,139,92,.16) 0);
    }

    .timer.warning .timer-core,
    .timer.warning strong { color: var(--color-warning); }

    .timer.danger .timer-ring {
      background: conic-gradient(var(--color-danger) calc(var(--progress,100) * 1%), rgba(255,95,95,.16) 0);
    }

    .timer.danger .timer-core,
    .timer.danger strong { color: var(--color-danger); }

    .audio-bar {
      position: relative;
      height: 54px;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
    }

    .audio-wave {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,.08) 0 6px,
        rgba(255,255,255,.18) 6px 10px,
        rgba(255,255,255,.08) 10px 16px
      );
    }

    .audio-playhead {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 24%;
      background: linear-gradient(90deg, rgba(255,255,255,.24), rgba(255,255,255,.04));
      animation: scan 2.2s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateX(-20%); }
      100% { transform: translateX(340%); }
    }

    .recorder-status {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      align-items: center;
      justify-content: space-between;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--color-text-muted);
    }

    .pill.recording::before {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--color-danger);
      box-shadow: 0 0 0 0 rgba(255,95,95,.7);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,95,95,.7); }
      70% { box-shadow: 0 0 0 11px rgba(255,95,95,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,95,95,0); }
    }

    .clips { display: grid; gap: var(--space-3); width: 100%; }

    .clip {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: var(--space-4);
      align-items: center;
      padding: var(--space-4);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      text-align: left;
    }

    .clip-title { font-weight: 700; }

    .clip-meta {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--color-text-faint);
      margin-top: 4px;
    }

    .clip-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      justify-content: flex-end;
      align-items: center;
    }

    audio { width: min(250px,100%); height: 40px; }

    .form-stack {
      width: min(540px,100%);
      display: grid;
      gap: var(--space-4);
    }

    .field {
      display: grid;
      gap: var(--space-2);
      text-align: left;
    }

    .field label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .16em;
      color: var(--color-text-faint);
    }

    .field input {
      width: 100%;
      min-height: 54px;
      padding: 0 var(--space-4);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      color: #fff;
    }

    .field input::placeholder { color: rgba(255,255,255,.35); }

    .status-box {
      width: min(540px,100%);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      text-align: left;
    }

    .success { color: var(--color-success); }

    @media (max-width:920px) {
      body { overflow: auto; }

      .app { min-height: 100vh; }

      .bg {
        background:
          linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.9)),
          url('./assets/thepressserchair.jpg') 50% 85% / cover no-repeat;
        transform: scale(1);
      }

      .bg::after {
        background:
          linear-gradient(
            180deg,
            rgba(0,0,0,.08) 0%,
            rgba(0,0,0,.18) 18%,
            rgba(0,0,0,.26) 36%,
            rgba(0,0,0,.42) 58%,
            rgba(0,0,0,.72) 82%,
            rgba(0,0,0,.9) 100%
          );
      }

      .shell {
        position: relative;
        grid-template-columns: 1fr;
        align-items: flex-start;
        min-height: 100vh;
        padding-top: var(--space-6);
        padding-bottom: var(--space-8);
        row-gap: var(--space-4);
      }

      .panel,
      .question-wrap {
        margin: 0 auto;
      }

      .title {
        max-width: none;
        font-size: clamp(2.3rem, 9vw, 3.4rem);
      }
    }

    @media (max-width:640px) {
      .app {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding-inline: var(--space-4);
        padding-top: var(--space-4);
        padding-bottom: var(--space-6);
        gap: var(--space-4);
      }

      .brand {
        padding-top: var(--space-3);
        padding-bottom: 0;
        min-height: 18vh;
        justify-content: flex-start;
      }

      .title {
        font-size: clamp(2rem, 10vw, 2.8rem);
        max-width: 6ch;
      }

      .panel {
        margin: 0 auto;
        width: 100%;
        max-width: 420px;
        padding: var(--space-4);
        gap: var(--space-4);
        backdrop-filter: blur(9px);
        max-height: none;
      }

      .tagline {
        font-size: var(--text-lg);
        max-width: 18ch;
      }

      .actions,
      .status-row,
      .recorder-status,
      .clip,
      .clip-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
        min-width: 0;
        min-height: 48px;
      }

      .question-wrap {
        width: 100%;
      }

      .question-card {
        padding: var(--space-4);
      }

      .question-text {
        font-size: clamp(1.15rem, 0.95rem + 1.2vw, 1.6rem);
      }

      .timer {
        justify-content: flex-start;
      }

      .clip {
        gap: var(--space-3);
      }

      audio { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg"></div>

    <main class="shell">
      <aside class="brand">
        <div>
          <h1 class="title">The Presser</h1>
        </div>
      </aside>

      <section id="screen-home" class="panel">
        <p class="tagline">Have you got what it takes?</p>
        <div class="actions">
          <button class="btn btn-primary" id="startFlowBtn">Take the chair</button>
        </div>
      </section>

      <section id="screen-intro" class="panel hidden">
        <p class="tagline">Just 3 questions. Do you have what it takes?</p>
        <div class="actions">
          <button class="btn btn-primary" id="playBtn">Play</button>
          <button class="btn btn-secondary" onclick="go('home')">Back</button>
        </div>
      </section>

      <section id="screen-question" class="question-wrap hidden">
        <div class="question-card">
          <div class="status-row">
            <div class="question-meta">
              <div class="question-label">
                Question <span id="qnum">1</span> of 3
              </div>
              <div class="progress" aria-hidden="true">
                <span class="dot active" id="dot1"></span>
                <span class="dot" id="dot2"></span>
                <span class="dot" id="dot3"></span>
              </div>
            </div>

            <div id="timer" class="timer" style="--progress:100">
              <div class="timer-ring">
                <div class="timer-core" id="tval">30</div>
              </div>
              <div class="timer-copy">
                <strong id="tlarge">30s</strong>
                <span>Remaining</span>
              </div>
            </div>
          </div>

          <p class="question-text" id="qtext"></p>

          <div class="audio-bar">
            <div class="audio-wave"></div>
            <div class="audio-playhead"></div>
          </div>

          <div class="recorder-status">
            <div class="pill recording" id="recordState">Recording live</div>
            <div class="note" id="recordNote">
              At zero, this answer is saved automatically as its own file and the next question begins.
            </div>
          </div>
        </div>
      </section>

      <section id="screen-finish" class="panel hidden">
        <p class="tagline">Enter your details</p>
        <div class="form-stack">
          <div class="field">
            <label for="tagName">Tag name</label>
            <input id="tagName" placeholder="Tag name" />
          </div>
          <div class="field">
            <label for="mobile">Mobile</label>
            <input id="mobile" placeholder="Mobile" />
          </div>

          <div class="clips" id="clipsList"></div>

          <div class="actions" style="justify-content:flex-start">
            <button class="btn btn-primary" id="submitBtn">Submit for judging</button>
          </div>

          <div class="status-box hidden" id="submitStatus"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const SUPABASE_URL = 'https://uewabjbwqibawngglhij.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_GLBXIg_lipdkrDJpY7An4g_fhVQA8-c';
    const SUPABASE_BUCKET = 'recordings';

    const BACKEND_SCORE_URL = 'https://YOUR-BACKEND-URL.onrender.com/api/score-submission';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const questions = [
      { key: 'q1', text: "Scrambled eggs. What's the secret to great scrambled eggs?", audio: './assets/scrambled eggs.mp3' },
      { key: 'q2', text: 'Fuel costs are soaring in servos across Australia. Explain what is happening.', audio: './assets/fuel costs.mp3' },
      { key: 'q3', text: 'Give a definition and also use in a sentence the word "immutable".', audio: './assets/immutable.mp3' }
    ];

    const promptAudio = new Audio();
    promptAudio.preload = 'auto';

    const map = {
      home: 'screen-home',
      intro: 'screen-intro',
      question: 'screen-question',
      finish: 'screen-finish'
    };

    const qtext = document.getElementById('qtext');
    const qnum = document.getElementById('qnum');
    const tval = document.getElementById('tval');
    const tlarge = document.getElementById('tlarge');
    const timerEl = document.getElementById('timer');
    const clipsList = document.getElementById('clipsList');
    const recordState = document.getElementById('recordState');
    const recordNote = document.getElementById('recordNote');
    const dots = [
      document.getElementById('dot1'),
      document.getElementById('dot2'),
      document.getElementById('dot3')
    ];
    const tagNameInput = document.getElementById('tagName');
    const mobileInput = document.getElementById('mobile');
    const submitBtn = document.getElementById('submitBtn');
    const submitStatus = document.getElementById('submitStatus');

    let currentQuestion = 0;
    let left = 30;
    let timer = null;
    let micStream = null;
    let recorder = null;
    let currentChunks = [];
    let mimeType = '';
    let recordedAnswers = [];

    function go(name) {
      Object.entries(map).forEach(([key, id]) => {
        document.getElementById(id).classList.toggle('hidden', key !== name);
      });
      if (name === 'finish') {
        requestAnimationFrame(() => {
          const panel = document.getElementById('screen-finish');
          panel.scrollTop = 0;
        });
      }
    }

    function updateDots() {
      dots.forEach((dot, idx) => {
        dot.classList.remove('active', 'done');
        if (idx < currentQuestion) dot.classList.add('done');
        if (idx === currentQuestion) dot.classList.add('active');
      });
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.96;
      utter.pitch = 0.92;
      speechSynthesis.speak(utter);
    }

    function showStatus(message, isError = false) {
      submitStatus.classList.remove('hidden');
      submitStatus.innerHTML =
        '<div class="status-copy ' + (isError ? '' : 'success') + '">' + message + '</div>';
    }

    async function initMic() {
      if (micStream) return micStream;
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      return micStream;
    }

    function chooseMimeType() {
      const options = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4'];
      if (!window.MediaRecorder) return '';
      return options.find(t => MediaRecorder.isTypeSupported(t)) || '';
    }

    function updateTimer() {
      const progress = Math.max(0, (left / 30) * 100);
      timerEl.style.setProperty('--progress', progress);
      tval.textContent = left;
      tlarge.textContent = left + 's';
      timerEl.classList.toggle('warning', left <= 10 && left > 3);
      timerEl.classList.toggle('danger', left <= 3);
      recordNote.textContent =
        left <= 10
          ? 'Final ten seconds. This file locks and saves automatically when the clock hits zero.'
          : 'At zero, this answer is saved automatically as its own file and the next question begins.';
    }

    function buildClipRow(answer, index) {
      const row = document.createElement('div');
      row.className = 'clip';

      const info = document.createElement('div');
      info.innerHTML =
        '<div class="clip-title">Question ' +
        (index + 1) +
        '</div><div class="clip-meta">' +
        answer.fileName +
        '</div>';

      const actions = document.createElement('div');
      actions.className = 'clip-actions';

      const audio = document.createElement('audio');
      audio.controls = true;
      audio.src = answer.url;

      actions.appendChild(audio);
      row.appendChild(info);
      row.appendChild(actions);
      clipsList.appendChild(row);
    }

    function stopRecorderForQuestion() {
      return new Promise(resolve => {
        if (!recorder || recorder.state === 'inactive') {
          resolve();
          return;
        }
        recorder.onstop = () => {
          const extension = mimeType && mimeType.includes('mp4') ? 'm4a' : 'webm';
          const blob = new Blob(currentChunks, {
            type: mimeType || 'audio/webm'
          });
          const fileName = 'question-' + (currentQuestion + 1) + '.' + extension;
          const file = new File([blob], fileName, {
            type: blob.type || 'audio/webm'
          });

          const answer = {
            questionNumber: currentQuestion + 1,
            key: questions[currentQuestion].key,
            prompt: questions[currentQuestion].text,
            fileName,
            file,
            url: URL.createObjectURL(blob)
          };
          recordedAnswers.push(answer);
          buildClipRow(answer, currentQuestion);
          currentChunks = [];
          resolve();
        };
        recorder.stop();
      });
    }

    async function startRecorderForQuestion() {
      await initMic();
      currentChunks = [];
      mimeType = chooseMimeType();
      recorder = mimeType
        ? new MediaRecorder(micStream, { mimeType })
        : new MediaRecorder(micStream);
      recorder.ondataavailable = event => {
        if (event.data && event.data.size > 0) currentChunks.push(event.data);
      };
      recorder.start();
    }

    async function beginQuestion() {
      updateDots();
      qnum.textContent = currentQuestion + 1;
      qtext.textContent = questions[currentQuestion].text;
      left = 30;
      updateTimer();
      recordState.textContent = 'Recording question ' + (currentQuestion + 1);

      if (window.speechSynthesis) speechSynthesis.cancel();
      promptAudio.pause();
      promptAudio.currentTime = 0;
      promptAudio.src = questions[currentQuestion].audio;
      promptAudio
        .play()
        .catch(() =>
          speak(
            'Question ' +
              (currentQuestion + 1) +
              '. ' +
              questions[currentQuestion].text
          )
        );

      await startRecorderForQuestion();
      clearInterval(timer);
      timer = setInterval(async () => {
        left -= 1;
        updateTimer();
        if (left <= 0) {
          clearInterval(timer);
          await stopRecorderForQuestion();
          currentQuestion += 1;
          if (currentQuestion < questions.length) {
            await beginQuestion();
          } else {
            go('finish');
          }
        }
      }, 1000);
    }

    async function saveSubmissionToSupabase(tag, mobile, answers) {
      const { data: submission, error: submissionError } = await db
        .from('submissions')
        .insert({
          tag,
          mobile,
          status: 'pending',
          q1_path: '',
          q2_path: '',
          q3_path: ''
        })
        .select()
        .single();

      if (submissionError) throw submissionError;

      const update = {};

      for (const answer of answers) {
        const extension = answer.fileName.split('.').pop();
        const path = `recordings/${submission.id}/${answer.key}.${extension}`;

        const { error: uploadError } = await db
          .storage
          .from(SUPABASE_BUCKET)
          .upload(path, answer.file, {
            contentType: answer.file.type || 'audio/webm',
            upsert: true
          });

        if (uploadError) throw uploadError;

        if (answer.key === 'q1') update.q1_path = path;
        if (answer.key === 'q2') update.q2_path = path;
        if (answer.key === 'q3') update.q3_path = path;
      }

      const { error: updateError } = await db
        .from('submissions')
        .update(update)
        .eq('id', submission.id);

      if (updateError) throw updateError;

      return submission.id;
    }

    async function notifyBackend(submissionId) {
      if (BACKEND_SCORE_URL.includes('YOUR-BACKEND-URL')) {
        return;
      }
      await fetch(BACKEND_SCORE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ submission_id: submissionId })
      });
    }

    document
      .getElementById('startFlowBtn')
      .addEventListener('click', () => go('intro'));

    document
      .getElementById('playBtn')
      .addEventListener('click', async () => {
        try {
          submitStatus.classList.add('hidden');
          recordedAnswers.forEach(a => URL.revokeObjectURL(a.url));
          recordedAnswers = [];
          clipsList.innerHTML = '';
          tagNameInput.value = '';
          mobileInput.value = '';
          currentQuestion = 0;
          go('question');
          await initMic();
          await beginQuestion();
        } catch (error) {
          alert(
            'Microphone access is required to play The Presser. Please allow microphone access and try again.'
          );
        }
      });

    submitBtn.addEventListener('click', async () => {
      const tag = tagNameInput.value.trim();
      const mobile = mobileInput.value.trim();

      if (!tag || !mobile) {
        showStatus('Please enter tag name and mobile.', true);
        return;
      }
      if (recordedAnswers.length !== 3) {
        showStatus('Three recordings are required before submission.', true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        showStatus('Uploading files to Supabase...');
        const submissionId = await saveSubmissionToSupabase(
          tag,
          mobile,
          recordedAnswers
        );
        showStatus('Files saved. Triggering judging...');
        await notifyBackend(submissionId);
        showStatus(
          'Great work. And now for the judgement. We will send you your scores on each question soon!'
        );
        submitBtn.textContent = 'Submitted';
        submitBtn.classList.remove('btn-primary');
        submitBtn.classList.add('btn-success');
      } catch (error) {
        console.error(error);
        showStatus(
          'Error: ' + (error.message || 'Submission failed.'),
          true
        );
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit for judging';
      }
    });

    window.addEventListener('beforeunload', () => {
      promptAudio.pause();
      if (micStream) micStream.getTracks().forEach(track => track.stop());
      recordedAnswers.forEach(a => URL.revokeObjectURL(a.url));
      if ('speechSynthesis' in window) speechSynthesis.cancel();
    });

    go('home');
  </script>
</body>
</html>
