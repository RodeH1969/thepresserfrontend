<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Presser</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.6rem, 1.1rem + 2vw, 2.7rem);
      --text-2xl: clamp(2.4rem, 1rem + 4vw, 5.2rem);
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --color-text: #f8fbff;
      --color-text-muted: rgba(248,251,255,0.78);
      --color-border: rgba(255,255,255,0.14);
      --color-panel: rgba(12, 14, 18, 0.92);
      --radius-lg: 1.25rem;
      --radius-xl: 1.75rem;
      --radius-full: 9999px;
      --font-body: 'Satoshi', Inter, sans-serif;
      --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: var(--font-body);
      background: #05070b;
      color: var(--color-text);
    }

    .hidden { display: none !important; }

    .app {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background: #05070b;
    }

    .bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.42), rgba(0,0,0,.62)),
        url('./assets/thepressserchair.jpg') center center / cover no-repeat;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(0,0,0,.84) 0%,
        rgba(0,0,0,.56) 22%,
        rgba(0,0,0,.08) 45%,
        rgba(0,0,0,.08) 55%,
        rgba(0,0,0,.56) 78%,
        rgba(0,0,0,.84) 100%
      );
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px, 34vw) 1fr;
      gap: var(--space-6);
      padding: clamp(var(--space-4), 3vw, var(--space-8));
      max-width: 1280px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      padding: var(--space-6) 0;
    }

    .title {
      font-size: var(--text-2xl);
      line-height: .92;
      font-weight: 900;
      letter-spacing: -.05em;
      max-width: 5ch;
      margin: 0;
      text-shadow: 0 8px 24px rgba(0,0,0,.45);
    }

    .panel {
      width: min(520px, 100%);
      margin: auto 0 auto auto;
      display: grid;
      gap: var(--space-5);
      justify-items: center;
      text-align: center;
      padding: 1.4rem;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(10px);
    }

    .tagline {
      font-size: var(--text-xl);
      font-weight: 700;
      line-height: 1.08;
      max-width: 14ch;
      margin: 0;
    }

    .copy {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      max-width: 30ch;
      line-height: 1.55;
      margin: 0;
    }

    .challenge-copy {
      display: grid;
      gap: 0.9rem;
      justify-items: center;
      text-align: center;
      width: 100%;
    }

    .challenge-title {
      margin: 0;
      font-size: clamp(1.8rem, 1.3rem + 2vw, 3rem);
      line-height: 1.06;
      font-weight: 900;
      color: #ffffff;
      max-width: 12ch;
    }

    .rotating-question-wrap {
      position: relative;
      width: min(680px, 100%);
      min-height: 3.4em;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .rotating-question {
      margin: 0;
      max-width: 26ch;
      font-size: clamp(1.05rem, 0.95rem + 0.9vw, 1.5rem);
      line-height: 1.3;
      font-weight: 700;
      color: rgba(255,255,255,0.84);
      opacity: 1;
      transform: translateY(0);
      transition:
        opacity 320ms ease,
        transform 320ms ease;
    }

    .rotating-question.is-changing {
      opacity: 0;
      transform: translateY(-10px);
    }

    .actions {
      width: 100%;
      display: grid;
      gap: var(--space-3);
      justify-items: center;
    }

    .btn {
      min-width: 220px;
      min-height: 52px;
      padding: 0 var(--space-6);
      border: none;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), opacity var(--transition);
      cursor: pointer;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: #fff;
      color: #05070b;
    }

    @media (max-width: 920px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .panel {
        margin: 0 auto;
      }

      .title {
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      html, body {
        height: 100%;
      }

      .app {
        min-height: 100dvh;
      }

      .bg {
        inset: 0 0 24dvh 0;
        background-position: center top;
        background-size: cover;
      }

      .bg::after {
        background:
          linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.28) 40%, rgba(0,0,0,.56) 100%),
          linear-gradient(90deg, rgba(0,0,0,.45) 0%, rgba(0,0,0,.08) 35%, rgba(0,0,0,.08) 65%, rgba(0,0,0,.45) 100%);
      }

      .shell {
        min-height: 100dvh;
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: 76dvh 24dvh;
        gap: 0;
        padding: 0;
        max-width: none;
      }

      .brand {
        grid-row: 1;
        align-self: start;
        padding: 1.5rem 1.25rem 0;
        z-index: 2;
      }

      .title {
        font-size: clamp(2rem, 10vw, 2.8rem);
        max-width: 6ch;
      }

      .panel {
        grid-row: 2;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0.9rem 1rem max(1rem, env(safe-area-inset-bottom));
        gap: 0.65rem;
        border-radius: 1.5rem 1.5rem 0 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
        background: rgba(8, 10, 14, 0.96);
        backdrop-filter: blur(12px);
        align-content: center;
        justify-items: center;
      }

      .tagline {
        font-size: 0.92rem;
        line-height: 1.08;
        max-width: 12ch;
      }

      .copy {
        font-size: 0.82rem;
        line-height: 1.35;
        max-width: 30ch;
      }

      .challenge-copy {
        gap: 0.55rem;
      }

      .challenge-title {
        font-size: 1.1rem;
        line-height: 1.04;
        max-width: 14ch;
      }

      .rotating-question-wrap {
        min-height: 2.9em;
      }

      .rotating-question {
        font-size: 0.86rem;
        line-height: 1.22;
        max-width: 28ch;
      }

      .actions {
        gap: 0.55rem;
        width: 100%;
      }

      .btn {
        width: min(100%, 340px);
        min-width: 0;
        min-height: 44px;
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg"></div>

    <main class="shell">
      <aside class="brand">
        <h1 class="title">The Presser</h1>
      </aside>

      <section class="panel">
        <div id="defaultCopy">
          <p class="tagline">Have you got what it takes?</p>
          <p class="copy">
            Get through all three questions to earn your place in the Daily Legends Lounge.
          </p>
        </div>

        <div class="challenge-copy hidden" id="challengeCopy">
          <h2 class="challenge-title">Could you answer in 25 secs?</h2>

          <div class="rotating-question-wrap" aria-live="polite">
            <div class="rotating-question" id="rotatingQuestion">
              Why we’re paying so much to fill our car?
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="thinkingCapBtn" type="button">Thinking Cap on?</button>
          <a class="btn btn-primary hidden" id="takeChairBtn" href="./question.html?round=1">Take the chair</a>
        </div>
      </section>
    </main>
  </div>

  <audio id="themeAudio" preload="auto" loop>
    <source src="./thepressertheme.mp3" type="audio/mpeg">
  </audio>

  <script>
    const thinkingCapBtn = document.getElementById('thinkingCapBtn');
    const takeChairBtn = document.getElementById('takeChairBtn');
    const themeAudio = document.getElementById('themeAudio');
    const defaultCopy = document.getElementById('defaultCopy');
    const challengeCopy = document.getElementById('challengeCopy');
    const rotatingQuestion = document.getElementById('rotatingQuestion');

    const prompts = [
      "Why we’re paying so much to fill our car?",
      "The key to great scrambled eggs?",
      "Define transcendent?",
      "The best actor of the 2020’s?",
      "What’s the most grating accent on the planet?"
    ];

    let promptIndex = 0;
    let rotationTimer = null;

    function startPromptRotation() {
      if (!rotatingQuestion || rotationTimer) return;

      rotationTimer = setInterval(() => {
        rotatingQuestion.classList.add('is-changing');

        setTimeout(() => {
          promptIndex = (promptIndex + 1) % prompts.length;
          rotatingQuestion.textContent = prompts[promptIndex];
          rotatingQuestion.classList.remove('is-changing');
        }, 320);
      }, 2200);
    }

    themeAudio.volume = 0.9;

    thinkingCapBtn.addEventListener('click', async () => {
      try {
        themeAudio.currentTime = 0;
        await themeAudio.play();
      } catch (error) {
        console.error('Theme music failed to start', error);
      }

      defaultCopy.classList.add('hidden');
      challengeCopy.classList.remove('hidden');
      startPromptRotation();

      thinkingCapBtn.classList.add('hidden');
      takeChairBtn.classList.remove('hidden');
    });
  </script>
</body>
</html>
