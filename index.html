<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Presser</title>

  <link rel="icon" type="image/jpeg" href="./assets/favicon.jpg">
  <link rel="shortcut icon" href="./assets/favicon.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --surface-border: rgba(255, 255, 255, 0.11);
      --text: #f5f7fb;
      --muted: rgba(255, 255, 255, 0.72);
      --button-bg: #f5f3ef;
      --button-text: #101114;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
      color: var(--text);
      font-family: "Inter", sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background:
        radial-gradient(circle at 50% 10%, rgba(138, 165, 192, 0.14), transparent 18%),
        linear-gradient(180deg, #03050a 0%, #05070c 42%, #03050a 100%);
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    button {
      font: inherit;
    }

    .page {
      min-height: 100svh;
      overflow: hidden;
    }

    .hero {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      padding: 28px 28px 34px;
      background:
        radial-gradient(circle at 50% 10%, rgba(190, 210, 230, 0.08), transparent 22%),
        linear-gradient(180deg, rgba(6, 9, 14, 0.96) 0%, rgba(4, 6, 10, 1) 100%);
    }

    .hero__header {
      position: relative;
      z-index: 10;
    }

    .hero__logo {
      margin: 0;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 0.92;
      font-weight: 800;
      letter-spacing: -0.06em;
      color: #ffffff;
    }

    .hero__spotlight {
      position: absolute;
      left: 50%;
      top: -10px;
      transform: translateX(-50%);
      width: min(42vw, 480px);
      height: 78vh;
      background:
        radial-gradient(
          circle at 50% 0%,
          rgba(255,255,255,0.30),
          rgba(255,255,255,0.12) 24%,
          rgba(255,255,255,0.04) 52%,
          transparent 76%
        );
      filter: blur(18px);
      opacity: 1;
      pointer-events: none;
      z-index: 1;
    }

    .hero__glow {
      position: absolute;
      left: 50%;
      top: 410px;
      transform: translateX(-50%);
      width: min(52vw, 520px);
      height: 130px;
      border-radius: 999px;
      background: radial-gradient(
        circle,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.06) 42%,
        transparent 72%
      );
      filter: blur(18px);
      opacity: 0.7;
      z-index: 2;
      pointer-events: none;
    }

    .hero__corner {
      position: absolute;
      top: 96px;
      z-index: 9;
      max-width: 150px;
      font-size: 0.78rem;
      line-height: 1.25;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero__corner--left {
      left: 28px;
      text-align: left;
    }

    .hero__corner--right {
      right: 28px;
      text-align: right;
    }

    .hero__chairWrap {
      position: absolute;
      left: 50%;
      top: 120px;
      transform: translateX(-50%);
      width: min(42vw, 460px);
      z-index: 6;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    .hero__chair {
      width: 100%;
      max-width: 460px;
      object-fit: contain;
      filter:
        drop-shadow(0 28px 36px rgba(0, 0, 0, 0.52))
        drop-shadow(0 0 28px rgba(172, 196, 218, 0.08));
    }

    .hero__card {
      position: relative;
      z-index: 12;
      width: min(100%, 620px);
      margin: min(74vh, 760px) auto 0;
      padding: 24px 22px 22px;
      border-radius: 26px;
      border: 1px solid var(--surface-border);
      background: linear-gradient(
        180deg,
        rgba(20, 23, 30, 0.74),
        rgba(8, 10, 14, 0.88)
      );
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-align: center;
    }

    .hero__headline {
      margin: 0 0 20px;
      font-size: clamp(1.5rem, 3.2vw, 2.5rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
      font-weight: 760;
      color: #ffffff;
    }

    .hero__cta {
      width: 160px;
      height: 160px;
      border: 0;
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow:
        0 18px 28px rgba(0, 0, 0, 0.30),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .hero__cta:hover {
      transform: translateY(-2px);
      box-shadow:
        0 22px 34px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }

    .hero__cta:active {
      transform: translateY(1px) scale(0.995);
    }

    .hero__cta:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.9);
      outline-offset: 5px;
    }

    .questions {
      min-height: 100svh;
      padding: 48px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #05070c 0%, #0a0d13 100%);
    }

    .questions__panel {
      width: min(100%, 720px);
      padding: 28px 24px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(18, 21, 28, 0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
    }

    .questions__title {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1;
    }

    .questions__text {
      margin: 0;
      color: rgba(255,255,255,0.72);
      font-size: 1rem;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      .hero {
        padding: 24px 20px 28px;
      }

      .hero__corner--left {
        left: 18px;
      }

      .hero__corner--right {
        right: 18px;
      }

      .hero__chairWrap {
        width: min(52vw, 360px);
      }

      .hero__card {
        margin-top: 70vh;
      }
    }

    @media (max-width: 768px) {
      .hero {
        min-height: 100svh;
        padding: 22px 16px 24px;
      }

      .hero__logo {
        font-size: clamp(2.2rem, 8.8vw, 3.5rem);
      }

      .hero__spotlight {
        width: 72vw;
        height: 62vh;
        top: 0;
        filter: blur(12px);
      }

      .hero__corner {
        top: 82px;
        max-width: 104px;
        font-size: 0.66rem;
        line-height: 1.2;
        letter-spacing: 0.1em;
      }

      .hero__corner--left {
        left: 12px;
      }

      .hero__corner--right {
        right: 12px;
      }

      .hero__chairWrap {
        top: 118px;
        width: min(78vw, 320px);
      }

      .hero__glow {
        top: 350px;
        width: 76vw;
        height: 96px;
        opacity: 0.55;
      }

      .hero__card {
        width: min(100%, 520px);
        margin-top: 72vh;
        padding: 20px 16px 18px;
        border-radius: 22px;
      }

      .hero__headline {
        margin-bottom: 16px;
        font-size: clamp(1.2rem, 6.4vw, 1.8rem);
      }

      .hero__cta {
        width: 132px;
        height: 132px;
        font-size: 0.82rem;
        letter-spacing: 0.04em;
      }
    }

    @media (max-width: 430px) {
      .hero__chairWrap {
        top: 122px;
        width: min(82vw, 300px);
      }

      .hero__glow {
        top: 336px;
      }

      .hero__card {
        margin-top: 70vh;
      }

      .hero__headline {
        font-size: 1.15rem;
      }

      .hero__cta {
        width: 124px;
        height: 124px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero__spotlight"></div>
      <div class="hero__glow"></div>

      <header class="hero__header">
        <h1 class="hero__logo">The Presser</h1>
      </header>

      <div class="hero__corner hero__corner--left">
        Fast answers.<br>
        Sharp instincts.
      </div>

      <div class="hero__corner hero__corner--right">
        Three questions.<br>
        One chair.
      </div>

      <div class="hero__chairWrap">
        <img
          src="./assets/thepressserchair.jpg"
          alt="The Presser chair under the spotlight"
          class="hero__chair"
        />
      </div>

      <div class="hero__card">
        <h2 class="hero__headline">Have you got what it takes?</h2>
        <button class="hero__cta" id="takeChairBtn">TAKE THE CHAIR</button>
      </div>
    </section>

    <section id="questions" class="questions">
      <div class="questions__panel">
        <h2 class="questions__title">Questions go here</h2>
        <p class="questions__text">
          This is now a real target section, so the button visibly moves the user down the page.
        </p>
      </div>
    </section>
  </div>

  <script>
    document.getElementById("takeChairBtn").addEventListener("click", function () {
      document.getElementById("questions").scrollIntoView({ behavior: "smooth" });
    });
  </script>
</body>
</html>
