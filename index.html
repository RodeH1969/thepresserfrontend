<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Presser</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.6rem, 1.1rem + 2vw, 2.7rem);
      --text-2xl: clamp(2.4rem, 1rem + 4vw, 5.2rem);
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --color-text: #f8fbff;
      --color-text-muted: rgba(248,251,255,0.78);
      --color-border: rgba(255,255,255,0.14);
      --radius-lg: 1.25rem;
      --radius-full: 9999px;
      --font-body: 'Satoshi', Inter, sans-serif;
      --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font-body);
      background: #05070b;
      color: var(--color-text);
    }

    .app {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.48), rgba(0,0,0,.62)),
        url('./assets/thepressserchair.jpg') center center / cover no-repeat;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(0,0,0,.84) 0%,
        rgba(0,0,0,.56) 22%,
        rgba(0,0,0,.08) 45%,
        rgba(0,0,0,.08) 55%,
        rgba(0,0,0,.56) 78%,
        rgba(0,0,0,.84) 100%
      );
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px,34vw) 1fr;
      gap: var(--space-6);
      padding: clamp(var(--space-4),3vw,var(--space-8));
      max-width: 1280px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      padding: var(--space-6) 0;
    }

    .title {
      font-size: var(--text-2xl);
      line-height: .92;
      font-weight: 900;
      letter-spacing: -.05em;
      max-width: 5ch;
      text-shadow: 0 8px 24px rgba(0,0,0,.45);
    }

    .panel {
      width: min(620px,100%);
      margin: auto 0 auto auto;
      display: grid;
      gap: var(--space-5);
      justify-items: center;
      text-align: center;
      padding: clamp(var(--space-6),2vw,var(--space-8));
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
    }

    .tagline {
      font-size: var(--text-xl);
      font-weight: 700;
      line-height: 1.08;
      max-width: 15ch;
    }

    .copy {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      max-width: 34ch;
      line-height: 1.6;
    }

    .btn {
      min-width: 190px;
      min-height: 52px;
      padding: 0 var(--space-6);
      border: none;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: #fff;
      color: #05070b;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition);
    }

    .btn:hover { transform: translateY(-2px); }

    @media (max-width: 920px) {
      .shell { grid-template-columns: 1fr; }
      .panel { margin: 0 auto; }
      .title { max-width: none; }
    }

    @media (max-width: 640px) {
      .shell {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 100vh;
      }
      .title {
        font-size: clamp(2rem, 10vw, 2.8rem);
        max-width: 6ch;
      }
      .panel {
        width: 100%;
        max-width: 420px;
        padding: var(--space-4);
      }
      .tagline { font-size: var(--text-lg); }
      .btn { width: 100%; min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg"></div>

    <main class="shell">
      <aside class="brand">
        <h1 class="title">The Presser</h1>
      </aside>

      <section class="panel">
        <p class="tagline">Have you got what it takes?</p>
        <p class="copy">
          Get through all three questions to earn your place on the Daily Legends Board.
        </p>
        <!-- Question 1 entry (existing flow) -->
        <a class="btn" href="./question.html?round=1">Take the chair</a>
      </section>
    </main>
  </div>
</body>
</html>
