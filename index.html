<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Presser</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.6rem, 1.1rem + 2vw, 2.7rem);
      --text-2xl: clamp(2.4rem, 1rem + 4vw, 5.2rem);
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --color-text: #f8fbff;
      --color-text-muted: rgba(248,251,255,0.78);
      --color-border: rgba(255,255,255,0.14);
      --radius-lg: 1.25rem;
      --radius-full: 9999px;
      --font-body: 'Satoshi', Inter, sans-serif;
      --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: var(--font-body);
      background: #05070b;
      color: var(--color-text);
    }

    .hidden { display: none !important; }

    .app {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.48), rgba(0,0,0,.62)),
        url('./assets/thepressserchair.jpg') center center / cover no-repeat;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(0,0,0,.84) 0%,
        rgba(0,0,0,.56) 22%,
        rgba(0,0,0,.08) 45%,
        rgba(0,0,0,.08) 55%,
        rgba(0,0,0,.56) 78%,
        rgba(0,0,0,.84) 100%
      );
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px,34vw) 1fr;
      gap: var(--space-6);
      padding: clamp(var(--space-4),3vw,var(--space-8));
      max-width: 1280px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      padding: var(--space-6) 0;
    }

    .title {
      font-size: var(--text-2xl);
      line-height: .92;
      font-weight: 900;
      letter-spacing: -.05em;
      max-width: 5ch;
      text-shadow: 0 8px 24px rgba(0,0,0,.45);
    }

    .panel {
      width: min(620px,100%);
      margin: auto 0 auto auto;
      display: grid;
      gap: var(--space-5);
      justify-items: center;
      text-align: center;
      padding: clamp(var(--space-6),2vw,var(--space-8));
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
    }

    .tagline {
      font-size: var(--text-xl);
      font-weight: 700;
      line-height: 1.08;
      max-width: 15ch;
    }

    .copy {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      max-width: 34ch;
      line-height: 1.6;
    }

    .actions {
      width: 100%;
      display: grid;
      gap: var(--space-3);
      justify-items: center;
    }

    .btn {
      min-width: 220px;
      min-height: 52px;
      padding: 0 var(--space-6);
      border: none;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), opacity var(--transition);
      cursor: pointer;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: #fff;
      color: #05070b;
    }

    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 1px solid var(--color-border);
    }

    @media (max-width: 920px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .panel {
        margin: 0 auto;
      }

      .title {
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      .shell {
        display: block;
        min-height: 100vh;
        padding: 1.25rem;
        position: relative;
      }

      .brand {
        position: absolute;
        top: 1.5rem;
        left: 1.25rem;
        z-index: 2;
        padding: 0;
      }

      .title {
        font-size: clamp(2rem, 10vw, 2.8rem);
        max-width: 6ch;
      }

      .panel {
        position: absolute;
        right: 1rem;
        bottom: 6.5rem;
        width: min(350px, calc(100vw - 2rem));
        margin: 0;
        padding: 1.1rem;
        gap: 0.9rem;
        text-align: center;
      }

      .tagline {
        font-size: 1.05rem;
        line-height: 1.1;
        max-width: 12ch;
      }

      .copy {
        font-size: 0.95rem;
        line-height: 1.45;
        max-width: 24ch;
      }

      .actions {
        gap: 0.75rem;
      }

      .btn {
        width: 100%;
        min-width: 0;
        min-height: 48px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg"></div>

    <main class="shell">
      <aside class="brand">
        <h1 class="title">The Presser</h1>
      </aside>

      <section class="panel">
        <p class="tagline">Have you got what it takes?</p>
        <p class="copy">
          Get through all three questions to earn your place on the Daily Legends Board.
        </p>

        <div class="actions">
          <button class="btn btn-primary" id="thinkingCapBtn" type="button">Thinking Cap on?</button>
          <a class="btn btn-secondary hidden" id="takeChairBtn" href="./question.html?round=1">Take the chair</a>
        </div>
      </section>
    </main>
  </div>

  <audio id="themeAudio" preload="auto" loop>
    <source src="./thepressertheme.mp3" type="audio/mpeg">
  </audio>

  <script>
    const thinkingCapBtn = document.getElementById('thinkingCapBtn');
    const takeChairBtn = document.getElementById('takeChairBtn');
    const themeAudio = document.getElementById('themeAudio');

    themeAudio.volume = 0.9;

    thinkingCapBtn.addEventListener('click', async () => {
      try {
        themeAudio.currentTime = 0;
        await themeAudio.play();
      } catch (error) {
        console.error('Theme music failed to start', error);
      }

      thinkingCapBtn.classList.add('hidden');
      takeChairBtn.classList.remove('hidden');
    });
  </script>
</body>
</html>
